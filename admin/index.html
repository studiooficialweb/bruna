<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Bruna Oliveira Joias</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: rgba(26,26,26,0.95);
      backdrop-filter: blur(10px);
      padding: 48px 40px;
      border-radius: 16px;
      border: 1px solid rgba(201,168,76,0.3);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #A07830, #E8C97A);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      font-weight: 700;
      color: #0A0A0A;
      font-family: 'Cormorant Garamond', serif;
    }
    .logo h1 {
      color: #E8C97A;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 2px;
    }
    .logo p {
      color: #888;
      font-size: 12px;
      margin-top: 4px;
    }
    .input-group {
      margin-bottom: 24px;
    }
    .input-group label {
      display: block;
      color: #CCCCCC;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      transition: all 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #C9A84C;
      background: rgba(255,255,255,0.08);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #A07830, #E8C97A);
      border: none;
      border-radius: 8px;
      color: #0A0A0A;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,168,76,0.3);
    }
    .error-msg {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.5);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .info {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">B</div>
    <h1>Painel Administrativo</h1>
    <p>Bruna Oliveira Joias & Semijoias</p>
  </div>
  <div id="errorMsg" class="error-msg"></div>
  <form id="loginForm">
    <div class="input-group">
      <label><i class="fas fa-user"></i> Usuário</label>
      <input type="text" id="username" placeholder="admin" autocomplete="off">
    </div>
    <div class="input-group">
      <label><i class="fas fa-lock"></i> Senha</label>
      <input type="password" id="password" placeholder="••••••">
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Entrar</button>
  </form>
  <div class="info">
    <i class="fas fa-shield-alt"></i> Área restrita - Apenas administradores
  </div>
</div>

<script>
  // Credenciais padrão (em produção, isso deve ser backend/banco)
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "bruna123";
  
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    
    if (username === ADMIN_USER && password === ADMIN_PASS) {
      // Salva sessão simulada
      sessionStorage.setItem('admin_logged', 'true');
      window.location.href = 'dashboard.html';
    } else {
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Usuário ou senha incorretos.';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
    }
  });
</script>
</body>
</html>
